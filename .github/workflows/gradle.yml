name: Build with Gradle

on:
  push:
    branches: [ "master" ]
    paths:
      - .github/workflows/gradle.yml
      - .gitmodules
      - build.gradle.kts
      - settings.gradle.kts
      - gradle/**
      - src/**
      - external/**
  pull_request:
    paths:
      - .github/workflows/gradle.yml
      - .gitmodules
      - build.gradle.kts
      - settings.gradle.kts
      - gradle/**
      - src/**
      - external/**

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - run: chmod +x gradlew
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      - name: Setup gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-overwrite-existing: true
          cache-read-only: false
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/terms-of-service"
          build-scan-terms-of-use-agree: "yes"
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build jar and prepare stub package
        run: ./gradlew shadowJar preparePythonStubPackage
      - name: Build stub wheel
        working-directory: build/generated/python-stub-package
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel
      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        if: success() && contains(github.ref_name, 'master')
        with:
          name: allaystone-jar
          path: build/libs/*.jar
      - name: Upload stub wheel artifact
        uses: actions/upload-artifact@v4
        if: success() && contains(github.ref_name, 'master')
        with:
          name: allaystone-python-stubs
          path: build/generated/python-stub-package/dist/*.whl
