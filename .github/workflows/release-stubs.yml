name: Release Assets

on:
  push:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Detect release version
        id: release
        env:
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          message="${HEAD_COMMIT_MESSAGE%%$'\n'*}"
          if [[ "$message" =~ ^feat:\ release\ ([^[:space:]]+)$ ]]; then
            echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.release.outputs.version != ''
        with:
          submodules: recursive

      - name: Make Gradle wrapper executable
        if: steps.release.outputs.version != ''
        run: chmod +x gradlew

      - name: Set up Java
        if: steps.release.outputs.version != ''
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Set up Python
        if: steps.release.outputs.version != ''
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Gradle
        if: steps.release.outputs.version != ''
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-overwrite-existing: true
          cache-read-only: false

      - name: Build shaded jar and prepare stub package
        if: steps.release.outputs.version != ''
        run: ./gradlew shadowJar preparePythonStubPackage

      - name: Build wheel
        if: steps.release.outputs.version != ''
        working-directory: build/generated/python-stub-package
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel

      - name: Publish release assets
        if: steps.release.outputs.version != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          if gh release view "$RELEASE_VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_VERSION" --repo "$GITHUB_REPOSITORY" build/libs/*-shaded.jar build/generated/python-stub-package/dist/*.whl --clobber
          else
            gh release create "$RELEASE_VERSION" --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" --title "$RELEASE_VERSION" --notes "" build/libs/*-shaded.jar build/generated/python-stub-package/dist/*.whl
          fi
