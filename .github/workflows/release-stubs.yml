name: Release Python Stubs

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-overwrite-existing: true
          cache-read-only: false

      - name: Prepare stub package
        run: ./gradlew preparePythonStubPackage

      - name: Build wheel
        working-directory: build/generated/python-stub-package
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel

      - name: Upload wheel to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" build/generated/python-stub-package/dist/*.whl --clobber
