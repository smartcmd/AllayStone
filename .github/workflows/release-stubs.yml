name: Release Assets

on:
  push:
    branches: [ "master" ]
  release:
    types: [published]

permissions:
  contents: write

jobs:
  create-release:
    if: github.event_name == 'push' && github.ref_name == 'master'
    runs-on: ubuntu-latest
    steps:
      - name: Detect and create release
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          message="${HEAD_COMMIT_MESSAGE%%$'\n'*}"
          if [[ ! "$message" =~ ^feat:\ release\ ([^[:space:]]+)$ ]]; then
            exit 0
          fi

          version="${BASH_REMATCH[1]}"
          if gh release view "$version" >/dev/null 2>&1; then
            exit 0
          fi

          gh release create "$version" --target "$GITHUB_SHA" --title "$version" --notes ""

  build-and-upload:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-overwrite-existing: true
          cache-read-only: false

      - name: Build shaded jar and prepare stub package
        run: ./gradlew shadowJar preparePythonStubPackage

      - name: Build wheel
        working-directory: build/generated/python-stub-package
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" build/libs/*-shaded.jar build/generated/python-stub-package/dist/*.whl --clobber
